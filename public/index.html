<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Voice Dashboard | Ambe Farms</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script> <!-- Placeholder fontawesome or icons -->
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div class="logo-area">
                <h1>Farmer Voice <span>&bull; AI</span></h1>
                <p style="color: #94a3b8; margin-top: 0.5rem;">GUJARATI / ENGLISH / HINGLISH SUPPORTED</p>
            </div>
            <div class="status-indicator">
                <span id="server-status" class="status-badge" style="background: rgba(34,197,94,0.1); color: #4ade80; border: 1px solid rgba(34,197,94,0.2);">System Online</span>
            </div>
        </header>

        <!-- Voice Simulator (Testing Strategy) -->
        <section class="voice-tester">
            <h2>Command Simulator 🎤</h2>
            <p style="margin-bottom: 1rem; opacity: 0.8;">Enter a voice transcript to test parsing and saving...</p>
            <div class="input-group">
                <textarea id="voice-input" placeholder="e.g., Ambe farm ma 5 majur nidamar ma che..."></textarea>
                <button id="send-btn">
                    <span>Parse & Save</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
            <div id="parse-result" style="margin-top: 1.5rem; display: none; font-family: monospace; background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem;">
                <!-- Result here -->
            </div>
        </section>

        <!-- Main Stats -->
        <div class="grid">
            <!-- Recent Transactions Table -->
            <div class="card" style="grid-column: span 2;">
                <h3>Recent Activities</h3>
                <div style="max-height: 400px; overflow-y: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Farm</th>
                                <th>Category</th>
                                <th>Detail</th>
                                <th>Amount</th>
                            </tr>
                        </thead>
                        <tbody id="activities-body">
                            <!-- Data here -->
                            <tr><td colspan="5" style="text-align:center;">Loading records...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Fertilizer Summary -->
            <div class="card">
                <h3>Seasonal Fertilizer Usage</h3>
                <div id="seasonal-summary">
                    <!-- Summary here -->
                    <p style="opacity: 0.5;">Loading summary...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

name: Supabase Multi-App Keep Alive

on:
  schedule:
    # Runs at 00:00 every Monday and Thursday
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

jobs:
  ping-apps:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Bean Tracker App
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"
          
      - name: Ping Farmer Voice Tracker
        run: |
          curl -X GET "${{ secrets.FARMER_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.FARMER_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.FARMER_KEY }}"

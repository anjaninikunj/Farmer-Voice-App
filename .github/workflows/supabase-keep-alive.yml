name: Supabase Multi-App Keep Alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping-apps:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Bean Tracker App
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
          "${{ secrets.SUPABASE_URL }}/rest/v1/BeanSales?select=Id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"

      - name: Ping Farmer Voice Tracker
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
          "${{ secrets.FARMER_URL }}/rest/v1/expense?select=id&limit=1" \
          -H "apikey: ${{ secrets.FARMER_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.FARMER_KEY }}"
